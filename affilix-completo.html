    function dashboard(){return `<div class="notice">Sistema completo local activo. Login administrador funcionando.</div><div class="head"><div><h1 class="title">Dashboard</h1><p class="sub">MÃ©tricas, productos, agente, tienda y tracking.</p></div><button class="btn primary" onclick="runAgent()">Run Full Cycle</button></div>${kpis()}<div class="grid two" style="margin-top:16px"><div class="card"><h2>Top productos</h2><table class="table"><tr><th>Producto</th><th>Plataforma</th><th>Clicks</th><th>ComisiÃ³n</th></tr>${state.products.map(p=>`<tr><td>${p.title}</td><td>${p.platform}</td><td>${p.clicks}</td><td>${money(p.commission)}</td></tr>`).join("")}</table></div><div class="card"><h2>Actividad</h2>${state.logs.slice(0,8).map(l=>`<p>${l.time} Â· ${l.action}</p>`).join("")||"<p>Sin actividad todavÃ­a.</p>"}</div></div>`}
    function products(){return `<div class="head"><div><h1 class="title">Productos</h1><p class="sub">CatÃ¡logo activo.</p></div><button class="btn primary" onclick="addProduct()">Agregar producto</button></div><div class="grid three">${filtered().map(productCard).join("")}</div>`}
    function discover(){return `<div class="head"><div><h1 class="title">Descubrir productos</h1><p class="sub">Escribe un nicho o elige uno. Si tienes API key en Settings, AFFILIX genera recomendaciones con IA.</p></div><button class="btn" onclick="state.view='settings';render()">Configurar API IA</button></div><div class="card" style="margin-bottom:16px"><div class="grid two"><div><label>Nicho o producto</label><input id="discoverInput" class="input" placeholder="Ej: gadgets de cocina, mascotas, suplementos"></div><div><label>Plataforma</label><select id="discoverPlatform"><option value="amazon">Amazon</option><option value="clickbank">ClickBank</option><option value="cj">CJ Affiliate</option><option value="shareasale">ShareASale</option></select></div></div><button class="btn primary" style="margin-top:14px" onclick="discoverCustom()">Descubrir con IA</button><button class="btn" style="margin-top:14px" onclick="discoverCustom(true)">Descubrir rapido sin IA</button></div><div class="grid three">${["Hogar y cocina","Mascotas","Fitness","Belleza","Suplementos","Software SaaS"].map(n=>`<div class="card"><h2>${n}</h2><p>Reglas: rating 4.2+, reviews 500+, precio $25-$100 o ClickBank gravity 20+.</p><button class="btn primary" onclick="discoverNiche('${n}')">Buscar nicho</button></div>`).join("")}</div>`}
    function content(){return `<div class="head"><div><h1 class="title">Contenido IA</h1><p class="sub">Genera descripciones, reviews, SEO, pros y contras usando la API configurada en Settings.</p></div><button class="btn" onclick="state.view='settings';render()">Configurar API IA</button></div><div class="card" style="margin-bottom:16px"><div class="row"><div><strong>Estado IA:</strong> <span class="${state.settings.apiKey?'green':'gold'}">${state.settings.apiKey?'API configurada':'Falta API key'}</span></div><button class="btn primary" onclick="bulkGenerateContent()">Generar contenido para todos</button></div></div><div class="grid three">${state.products.map(p=>`<div class="card"><h2>${p.title}</h2><p>${p.ai||"Contenido pendiente."}</p><button class="btn primary" onclick="genContent('${p.id}')">Generar contenido</button><button class="btn" onclick="showDetails('${p.id}')" style="margin-top:8px">Ver detalles</button></div>`).join("")}</div>`}
    function automation(){const items=["auto_discover","auto_prices","auto_content","auto_new_releases"];return `<h1 class="title">AutomatizaciÃ³n</h1><div class="grid two">${items.map(id=>`<div class="card"><h2>${id}</h2><p>Estado: <strong class="${state.automations[id]?"green":"gold"}">${state.automations[id]?"ON":"OFF"}</strong></p><button class="btn primary" onclick="toggleAuto('${id}')">${state.automations[id]?"Desactivar":"Activar"}</button><button class="btn" onclick="runAuto('${id}')">Ejecutar ahora</button></div>`).join("")}</div>`}
    function analytics(){return `<h1 class="title">Analytics</h1>${kpis()}<div class="card" style="margin-top:16px"><h2>Comisiones registradas</h2><table class="table"><tr><th>Fecha</th><th>Producto</th><th>Monto</th></tr>${state.commissions.map(c=>`<tr><td>${c.time}</td><td>${c.title}</td><td>${money(c.amount)}</td></tr>`).join("")}</table></div>`}
    function accounts(){return `<div class="head"><div><h1 class="title">Cuentas donde vender gratis por comisiÃ³n</h1><p class="sub">Crea una cuenta gratis, inicia sesiÃ³n, genera tu link afiliado y pÃ©galo en AFFILIX.</p></div><button class="btn primary" onclick="state.view='providers';render()">Ver proveedores</button></div><div class="grid three">${affiliatePlatforms.map(p=>`<div class="card"><h2>${p.name}</h2><p>Estado: <strong class="${state.accounts[p.id]?"green":"gold"}">${state.accounts[p.id]?"Conectado":"Pendiente"}</strong></p><p><strong>Tipo:</strong> ${p.type}</p><p><strong>ComisiÃ³n:</strong> ${p.commission}</p><p><strong>Ejemplo:</strong> ${p.best}</p><div class="row"><a class="btn primary" target="_blank" href="${p.signup}">Crear cuenta gratis</a><a class="btn" target="_blank" href="${p.login}">Login</a></div><input class="input" id="key_${p.id}" placeholder="Pega API key, tag, nickname o ID afiliado" style="margin-top:12px"><button class="btn primary" onclick="connect('${p.id}')" style="margin-top:8px">Guardar cuenta en AFFILIX</button></div>`).join("")}</div>`}
    function providers(){return `<div class="head"><div><h1 class="title">Panel de proveedores</h1><p class="sub">Todos los proveedores/plataformas para vender sin stock y ganar comisiÃ³n.</p></div></div><div class="card"><table class="table"><tr><th>Proveedor</th><th>Gratis</th><th>QuÃ© vende</th><th>Ejemplos</th><th>Acceso</th></tr>${affiliatePlatforms.map(p=>`<tr><td><strong>${p.name}</strong><br><small>${p.note}</small></td><td>${p.free}</td><td>${p.type}<br><span class="chip">${p.commission}</span></td><td>${p.best}</td><td><a class="btn primary" target="_blank" href="${p.signup}">Crear</a> <a class="btn" target="_blank" href="${p.login}">Login</a></td></tr>`).join("")}</table></div><div class="grid three" style="margin-top:16px">${affiliatePlatforms.map(p=>`<div class="card"><h2>${p.name}</h2><p><strong>Necesitas:</strong> ${p.needs}</p><p><strong>Paso 1:</strong> Crear cuenta gratis.</p><p><strong>Paso 2:</strong> Entrar al marketplace o programa.</p><p><strong>Paso 3:</strong> Generar link afiliado.</p><p><strong>Paso 4:</strong> Pegar link en AFFILIX.</p></div>`).join("")}</div>`}
    function settings(){return `<div class="head"><div><h1 class="title">Settings IA</h1><p class="sub">Pega aqui una sola API key. AFFILIX la guarda en este equipo y la usa para Discover, Contenido IA y Agente.</p></div></div><div class="card"><label>Proveedor IA</label><select id="provider"><option value="openai">OpenAI</option><option value="groq">Groq</option><option value="anthropic">Anthropic</option><option value="mistral">Mistral</option></select><br><br><label>Modelo</label><input id="aiModel" class="input" value="${state.settings.model||"gpt-4o-mini"}"><small style="display:block;color:var(--muted);margin-top:6px">OpenAI recomendado: gpt-4o-mini para bajo coste o gpt-4o para mas calidad.</small><br><label>API key</label><input id="apiKey" class="input" type="password" value="${state.settings.apiKey||""}" placeholder="Pega aqui tu API key"><br><br><div class="row" style="justify-content:flex-start;flex-wrap:wrap"><button class="btn primary" onclick="saveAISettings()">Guardar API</button><button class="btn" onclick="testAI()">Probar conexion</button><button class="btn danger" onclick="clearAISettings()">Borrar API</button></div><p id="aiStatus">${state.settings.apiKey?"API guardada. Ya puedes usar IA en todo el sistema.":"Aun no hay API key guardada."}</p></div>`}
    function store(){return `<div class="storeHero"><div class="head"><div><h1 class="title">Tienda pública</h1><p class="sub">Vista que verá el comprador final. Cada producto tiene mejor precio y detalles completos.</p></div><button class="btn primary" onclick="state.view='products';render()">Ver todos los productos</button></div></div><div class="grid storeGrid">${state.products.filter(p=>p.active).map(productCard).join("")}</div>`}
    function agent(){return `<h1 class="title">Agente IA</h1><div class="grid two"><div class="card"><textarea id="agentMsg" placeholder="Orden para el agente..."></textarea><button class="btn primary" onclick="agentChat()">Enviar</button></div><div class="card"><button class="btn primary" onclick="runAgent()">Run Full Cycle</button><p id="agentOut">Listo para trabajar.</p></div></div>`}
    function render(){const map={dashboard,products,discover,content,automation,analytics,accounts,providers,settings,store,agent};$("#view").innerHTML=map[state.view]()}
    async function aiText(prompt){
      const cfg=state.settings||{};
      if(!cfg.apiKey) throw new Error("Falta API key");
      const provider=cfg.provider||"openai";
      const model=cfg.model||"gpt-4o-mini";
      let url="",headers={"Content-Type":"application/json"},body={};
      if(provider==="openai"||provider==="groq"||provider==="mistral"){
        url=provider==="openai"?"https://api.openai.com/v1/chat/completions":provider==="groq"?"https://api.groq.com/openai/v1/chat/completions":"https://api.mistral.ai/v1/chat/completions";
        headers.Authorization="Bearer "+cfg.apiKey;
        body={model,messages:[{role:"user",content:prompt}],temperature:.6};
        const r=await fetch(url,{method:"POST",headers,body:JSON.stringify(body)});
        if(!r.ok) throw new Error(await r.text());
        const j=await r.json();
        return j.choices?.[0]?.message?.content||"";
      }
      if(provider==="anthropic"){
        url="https://api.anthropic.com/v1/messages";
        headers["x-api-key"]=cfg.apiKey;headers["anthropic-version"]="2023-06-01";
        body={model,max_tokens:1200,messages:[{role:"user",content:prompt}]};
        const r=await fetch(url,{method:"POST",headers,body:JSON.stringify(body)});
        if(!r.ok) throw new Error(await r.text());
        const j=await r.json();
        return j.content?.[0]?.text||"";
      }
      throw new Error("Proveedor no soportado");
    }
    function fallbackContent(p){return `Ficha afiliada para ${p.title}: producto recomendado de ${p.platform}, precio aproximado ${money(p.price)}, rating ${p.rating}/5. Beneficios: buen potencial de conversion, nicho claro, comision estimada ${money(p.commission)}. CTA: Ver mejor precio.`}
    function saveAISettings(){state.settings={provider:$("#provider").value,model:$("#aiModel").value.trim()||"gpt-4o-mini",apiKey:$("#apiKey").value.trim()};save();$("#aiStatus").textContent="API guardada. Ya puedes usar IA en todo el sistema.";toast("API IA guardada")}
    function clearAISettings(){state.settings={provider:"openai",model:"gpt-4o-mini"};save();render();toast("API IA borrada")}
    async function testAI(){saveAISettings();$("#aiStatus").textContent="Probando conexion...";try{const out=await aiText("Responde solo OK AFFILIX");$("#aiStatus").textContent="Conexion correcta: "+out.slice(0,80);toast("Conexion IA correcta")}catch(e){$("#aiStatus").textContent="Error de conexion: "+e.message;toast("Error probando IA")}}
    async function discoverCustom(fast=false){const q=$("#discoverInput").value.trim()||"producto ganador";const platform=$("#discoverPlatform").value;let title=`Producto ganador - ${q}`;let desc="Producto sugerido por reglas locales.";if(!fast){try{const out=await aiText(`Sugiere un producto afiliado realista para el nicho ${q} en ${platform}. Responde con un titulo corto y una descripcion breve en español.`);title=out.split("\n")[0].replace(/^[-# ]+/,"").slice(0,80)||title;desc=out}catch(e){toast("IA no disponible: usando descubrimiento rapido")}}const p={id:crypto.randomUUID(),title,platform,price:platform==="clickbank"?59:67,commission:platform==="clickbank"?29.5:3.02,rating:4.6,clicks:0,active:true,emoji:"BOX",url:platform==="clickbank"?"https://www.clickbank.com/marketplace":"https://www.amazon.com",category:q,reviews:"N/D",desc,features:["Producto descubierto","Nicho: "+q,"Plataforma: "+platform,"Listo para publicar"],photos:["🔥","📦","🛒","⭐"],ai:desc};state.products.unshift(p);log("Descubierto: "+title);save();render();toast("Producto descubierto")}
    async function discoverNiche(n){$("#discoverInput")&&($("#discoverInput").value=n);await discoverCustom(!state.settings.apiKey)}
    async function bulkGenerateContent(){for(const p of state.products){if(!p.ai||p.ai.includes("pendiente")){await genContent(p.id)}}toast("Contenido generado para todos")}    function addProduct(){const title=prompt("Nombre del producto");if(!title)return;state.products.unshift({id:crypto.randomUUID(),title,platform:"amazon",price:49.99,commission:2.25,rating:4.5,clicks:0,active:true,emoji:"BOX",url:"https://amazon.com"});log("Producto agregado manualmente");save();render();toast("Producto agregado")}
    async function genContent(id){const p=state.products.find(x=>x.id===id);toast("Generando contenido IA...");try{const text=await aiText(`Genera en español una ficha de afiliado para el producto: ${p.title}. Precio: ${p.price}. Plataforma: ${p.platform}. Escribe descripcion persuasiva, SEO title, meta description, 4 beneficios, 3 pros, 2 contras y CTA. No inventes datos tecnicos no dados.`);p.ai=text||fallbackContent(p);log("Contenido IA generado: "+p.title);save();render();toast("Contenido IA generado")}catch(e){p.ai=fallbackContent(p);log("Contenido fallback generado: "+p.title);save();render();toast("Sin conexion IA: contenido local generado")}}
    function toggleAuto(id){state.automations[id]=!state.automations[id];log(`${id} ${state.automations[id]?"activado":"desactivado"}`);save();render()}
    function runAuto(id){log("AutomatizaciÃ³n ejecutada: "+id);toast("AutomatizaciÃ³n ejecutada");render()}
    async function runAgent(){await discoverNiche("Hogar");await discoverNiche("Mascotas");await discoverNiche("Suplementos");$("#agentState").textContent="Ultimo ciclo completado";log("Run Full Cycle ejecutado");save();render();toast("Agente completo ciclo")}
    async function agentChat(){const msg=$("#agentMsg").value;const out=$("#agentOut");out.textContent="Procesando...";try{out.textContent=await aiText(`Eres el agente AFFILIX. Responde y ejecuta una recomendacion breve para esta orden: ${msg}`)}catch(e){out.textContent="Agente local: "+msg+". Configura una API key valida en Settings para respuestas reales con IA."}log("Chat agente: "+msg);save();toast("Respuesta del agente lista")}
    function connect(p){state.accounts[p]=true;log("Cuenta conectada: "+p);save();render();toast(p+" conectado")}
    function showDetails(id){const p=state.products.find(x=>x.id===id);const photos=p.photos||[p.emoji||"BOX","PHOTO","CART","STAR"];const features=p.features||["Producto afiliado","Precio actualizado","Link de proveedor","Tracking interno"];const html=`<div class="modal" id="detailModal"><div class="modalBox"><div class="detailGrid"><div class="gallery"><div class="photoMain">${photos[0]}</div><div class="thumbs">${photos.map(x=>`<div class="thumbMini">${x}</div>`).join("")}</div></div><div class="detailBody"><button class="btn close" onclick="closeDetails()">Cerrar</button><span class="chip">${p.platform}</span><h1 class="title" style="margin-top:12px">${p.title}</h1><p>${p.desc||p.ai||"Producto afiliado listo para publicar."}</p><div class="specs"><div class="spec"><small>Precio</small><strong class="green">${money(p.price)}</strong></div><div class="spec"><small>Comisión estimada</small><strong class="gold">${money(p.commission)}</strong></div><div class="spec"><small>Rating</small><strong>${p.rating}/5</strong></div><div class="spec"><small>Reviews</small><strong>${p.reviews||"N/D"}</strong></div><div class="spec"><small>Categoría</small><strong>${p.category||"General"}</strong></div><div class="spec"><small>Clicks registrados</small><strong>${p.clicks}</strong></div></div><h2>Características</h2><ul>${features.map(f=>`<li>${f}</li>`).join("")}</ul><h2>Contenido IA</h2><p>${p.ai||"Pendiente de generar contenido IA."}</p><div class="detailActions"><button class="btn primary" onclick="track('${p.id}')">Ver mejor precio</button><a class="btn" target="_blank" href="${p.url}">Abrir proveedor</a><button class="btn" onclick="genContent('${p.id}');closeDetails();showDetails('${p.id}')">Generar contenido IA</button></div></div></div></div></div>`;document.body.insertAdjacentHTML("beforeend",html)}
    function closeDetails(){const m=$("#detailModal");if(m)m.remove()}    function track(id){const p=state.products.find(x=>x.id===id);p.clicks++;state.commissions.push({time:new Date().toLocaleString(),title:p.title,amount:p.commission});log("Click registrado: "+p.title);save();render();toast("Click y comisiÃ³n simulada registrados")}
    boot();
  </script>
